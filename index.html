<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>OBLITERATE</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  width: 100%; height: 100%;
  overflow: hidden;
  background: #07070d;
  font-family: 'Georgia', serif;
}

#app {
  width: 100vw;
  height: 100vh;
  height: 100dvh;
  display: flex;
  flex-direction: column;
  background: #07070d;
  position: relative;
  overflow: hidden;
}

/* ── TOP BAR ── */
#topBar {
  position: absolute;
  top: 0; left: 0; right: 0;
  z-index: 10;
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: clamp(10px, 2vw, 18px) clamp(14px, 3vw, 28px);
  background: linear-gradient(to bottom, rgba(7,7,13,0.95) 60%, transparent);
  pointer-events: none;
}

#title {
  font-family: 'Courier New', monospace;
  font-size: clamp(11px, 1.5vw, 13px);
  letter-spacing: 4px;
  color: rgba(255,255,255,0.18);
  text-transform: uppercase;
  pointer-events: none;
  user-select: none;
}

#langToggle {
  display: flex;
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 20px;
  overflow: hidden;
  background: rgba(255,255,255,0.03);
  pointer-events: all;
}
.langBtn {
  padding: 5px 14px;
  font-size: 10px;
  letter-spacing: 1.2px;
  cursor: pointer;
  border: none;
  background: transparent;
  color: rgba(255,255,255,0.28);
  transition: all 0.15s;
  text-transform: uppercase;
  font-family: 'Courier New', monospace;
}
.langBtn.active { background: rgba(255,255,255,0.09); color: rgba(255,255,255,0.85); }

/* ── CANVAS ── */
#canvas {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
  cursor: crosshair;
  display: block;
  touch-action: none;
}

/* ── BOTTOM PANEL ── */
#panel {
  position: absolute;
  bottom: 0; left: 0; right: 0;
  z-index: 10;
  padding: clamp(10px, 2vw, 20px) clamp(14px, 3vw, 28px);
  padding-bottom: calc(clamp(10px, 2vw, 20px) + env(safe-area-inset-bottom, 0px));
  background: linear-gradient(to top, rgba(7,7,13,0.97) 55%, transparent);
  display: flex;
  flex-direction: column;
  gap: 10px;
}

/* mode buttons */
#modeBar {
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
}
.modeBtn {
  padding: 4px clamp(9px, 1.8vw, 14px);
  border-radius: 20px;
  border: 1px solid rgba(255,255,255,0.1);
  background: transparent;
  color: rgba(255,255,255,0.32);
  font-size: clamp(9px, 1.3vw, 11px);
  letter-spacing: 0.8px;
  cursor: pointer;
  text-transform: uppercase;
  transition: all 0.15s;
  font-family: 'Courier New', monospace;
}
.modeBtn.active {
  background: rgba(255,255,255,0.08);
  border-color: rgba(255,255,255,0.22);
  color: rgba(255,255,255,0.88);
}
.modeBtn:hover { border-color: rgba(255,255,255,0.2); color: rgba(255,255,255,0.6); }

/* input row */
#inputRow {
  display: flex;
  gap: 8px;
  align-items: flex-end;
  width: 100%;
}

#textInput {
  flex: 1;
  min-width: 0;
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 8px;
  color: #fff;
  font-size: clamp(13px, 2vw, 17px);
  padding: 9px 13px;
  outline: none;
  font-family: 'Georgia', serif;
  letter-spacing: 1.2px;
  resize: none;
  overflow-y: auto;
  max-height: clamp(80px, 15vh, 140px);
  line-height: 1.5;
  scrollbar-width: thin;
  scrollbar-color: rgba(255,255,255,0.1) transparent;
}
#textInput::placeholder { color: rgba(255,255,255,0.18); }
#textInput:focus { border-color: rgba(255,100,80,0.45); }

#btnCol {
  display: flex;
  flex-direction: column;
  gap: 6px;
  flex-shrink: 0;
}
.btn {
  padding: 8px clamp(10px, 2vw, 18px);
  border-radius: 7px;
  border: 1px solid rgba(255,255,255,0.13);
  background: rgba(255,255,255,0.04);
  color: rgba(255,255,255,0.65);
  font-size: clamp(9px, 1.3vw, 11px);
  letter-spacing: 1px;
  cursor: pointer;
  transition: all 0.15s;
  text-transform: uppercase;
  white-space: nowrap;
  font-family: 'Courier New', monospace;
}
.btn:hover { background: rgba(255,255,255,0.09); color: #fff; }
.btn.danger {
  border-color: rgba(255,55,55,0.35);
  background: rgba(255,30,30,0.06);
  color: rgba(255,110,90,0.88);
}
.btn.danger:hover { background: rgba(255,30,30,0.16); color: #ff6b5b; }

#hint {
  font-size: clamp(8px, 1.2vw, 10px);
  color: rgba(255,255,255,0.16);
  letter-spacing: 1.4px;
  text-transform: uppercase;
  font-family: 'Courier New', monospace;
}

/* ── MULTIPLAYER UI ── */
#topMeta {
  display: flex;
  align-items: center;
  gap: 12px;
}
#onlineCount, #nickname {
  font-family: 'Courier New', monospace;
  font-size: 10px;
  color: rgba(255,255,255,0.35);
  letter-spacing: 1.2px;
  white-space: nowrap;
  user-select: none;
}
#nickname { pointer-events: none; }
#onlineWrap {
  position: relative;
}
#onlineCount {
  cursor: pointer;
  pointer-events: all;
  transition: color 0.15s;
}
#onlineCount:hover { color: rgba(255,255,255,0.65); }
#presenceDropdown {
  display: none;
  position: absolute;
  top: calc(100% + 8px);
  left: 0;
  min-width: 160px;
  background: rgba(10,10,18,0.97);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 10px;
  padding: 6px 0;
  z-index: 200;
  backdrop-filter: blur(8px);
  box-shadow: 0 8px 24px rgba(0,0,0,0.5);
}
#presenceDropdown.open { display: block; }
.presence-item {
  padding: 5px 14px;
  font-family: 'Courier New', monospace;
  font-size: 9px;
  letter-spacing: 1px;
  color: rgba(255,255,255,0.5);
  white-space: nowrap;
  display: flex;
  align-items: center;
  gap: 7px;
}
.presence-item.me { color: rgba(255,180,100,0.85); }
.presence-dot {
  width: 5px; height: 5px;
  border-radius: 50%;
  background: rgba(100,255,140,0.7);
  flex-shrink: 0;
}

/* ── INSERT AFTER: multiplayer UI styles ── */
/* Step 3: Ghost notification */
.ghost-notif {
  position: fixed;
  top: 56px;
  left: 50%;
  transform: translateX(-50%);
  background: rgba(255,255,255,0.07);
  border: 1px solid rgba(255,255,255,0.12);
  border-radius: 20px;
  padding: 5px 14px;
  font-family: 'Courier New', monospace;
  font-size: 10px;
  color: rgba(255,255,255,0.5);
  letter-spacing: 1.2px;
  pointer-events: none;
  z-index: 99;
  opacity: 0;
  transition: opacity 0.2s;
  white-space: nowrap;
}

/* ── THANOS MODE TOGGLE ── */
#thanosToggle {
  margin-left: auto;
  flex-shrink: 0;
  padding: 4px clamp(9px, 1.8vw, 14px);
  border-radius: 20px;
  border: 1px solid rgba(150,100,255,0.22);
  background: transparent;
  color: rgba(180,140,255,0.4);
  font-size: clamp(9px, 1.3vw, 11px);
  letter-spacing: 0.8px;
  cursor: pointer;
  font-family: 'Courier New', monospace;
  transition: all 0.2s;
  white-space: nowrap;
  text-transform: uppercase;
}
#thanosToggle:hover {
  border-color: rgba(150,100,255,0.45);
  color: rgba(200,160,255,0.75);
}
#thanosToggle.active {
  background: rgba(110,50,240,0.18);
  border-color: rgba(180,120,255,0.55);
  color: rgba(220,190,255,0.95);
  box-shadow: 0 0 10px rgba(130,70,255,0.25);
}

/* ── THANOS LOG (right-side timeline) ── */
#thanosLog {
  position: fixed;
  right: clamp(14px, 3vw, 28px);
  top: 64px;
  width: clamp(160px, 22vw, 260px);
  max-height: 55vh;
  display: flex;
  flex-direction: column;
  gap: 5px;
  pointer-events: none;
  z-index: 9;
  overflow: hidden;
}
.thanos-log-entry {
  font-family: 'Courier New', monospace;
  font-size: clamp(8px, 1.05vw, 10px);
  color: rgba(200,160,255,0);
  text-align: right;
  letter-spacing: 0.6px;
  line-height: 1.45;
  padding-right: 9px;
  border-right: 2px solid rgba(140,80,255,0.35);
  transition: color 0.35s;
  word-break: keep-all;
}
.thanos-log-entry.visible {
  color: rgba(200,160,255,0.75);
}
</style>
</head>
<body>
<div id="app">
  <canvas id="canvas"></canvas>
  <div id="thanosLog"></div>

  <div id="topBar">
    <div id="title">Obliterate</div>
    <div id="topMeta">
      <div id="onlineWrap">
        <span id="onlineCount"></span>
        <div id="presenceDropdown"></div>
      </div>
      <span id="nickname"></span>
    </div>
    <div id="langToggle">
      <button class="langBtn active" data-lang="ko">한국어</button>
      <button class="langBtn" data-lang="en">Eng</button>
    </div>
  </div>

  <div id="panel">
    <div id="modeBar">
      <button id="thanosToggle"></button>
    </div>
    <div id="inputRow">
      <textarea id="textInput" rows="2" spellcheck="false"></textarea>
      <div id="btnCol">
        <button class="btn" id="spawnBtn"></button>
        <button class="btn danger" id="destroyBtn"></button>
      </div>
    </div>
    <div id="hint"></div>
  </div>
</div>

<script>
const LANG = {
  ko: {
    modes: ['💥 폭발','🔥 ','🌀 소멸','❄ 파쇄'],
    placeholder: '파괴할 텍스트를 입력하세요\n여러 줄도 됩니다...',
    spawn: '소환',
    destroy: '전부 파괴',
    hint: '마우스를 글자 위에 올리면 파괴됩니다',
    defaultText: '스트레스여\n안녕',
    thanosOn: '🔱 타노스 ON',
    thanosOff: '🔱 타노스 OFF',
    thanosLogOn: (nick) => `${nick}님이 타노스 모드를 켰습니다`,
    thanosLogOff: (nick) => `${nick}님이 타노스 모드를 껐습니다`,
    thanosBlocked: (sec) => `🔱 타노스 남용 감지! ${sec}초 후 해제됩니다`,
  },
  en: {
    modes: ['💥 Explode','🔥 Burn','🌀 Void','❄ Shatter'],
    placeholder: 'Type something to obliterate...\nMultiple lines supported.',
    spawn: 'Spawn',
    destroy: 'Destroy All',
    hint: 'Hover over letters to destroy them',
    defaultText: 'GOODBYE\nSTRESS',
    thanosOn: '🔱 Thanos ON',
    thanosOff: '🔱 Thanos OFF',
    thanosLogOn: (nick) => `${nick} enabled Thanos mode`,
    thanosLogOff: (nick) => `${nick} disabled Thanos mode`,
    thanosBlocked: (sec) => `🔱 Thanos abuse detected! Unlocks in ${sec}s`,
  }
};

let lang = 'ko', mode = 'explode', thanosMode = false;
const modeKeys = ['explode','burn','void','shatter'];

// ── INSERT AFTER: LANG/mode declarations ──
// Step 1: Nickname system
(function initNickname() {
  const ADJS = [
    '심심한','열받은','지친','억울한','신난','멍한','화난','설레는','졸린','배고픈',
    '무서운','슬픈','행복한','당황한','뻔뻔한','외로운','질투하는','황당한','뿌듯한','민망한',
    '짜증난','쑥스러운','긴장한','후회하는','그리운','두근거리는','불안한','허탈한','뭉클한','어이없는',
    '흥분한','지루한',
    '기가막힌','어처구니없는','황홀한','찐한','눈물나는','미칠것같은','아찔한','뒤통수맞은',
    '소름돋는','오글거리는','띵한','얼떨떨한','통쾌한','억장무너지는','입틀막','현타온',
    '감격스러운','알수없는','애매한','민망스러운','씁쓸한','찜찜한','뭔가이상한',
    '넋나간','피곤죽겠는','설레발치는','자책하는','모르겠는','멍때리는','어색한'
  ];
  const NOUNS = [
    '냉장고','두부','연필깎이','부처님','슬리퍼','에어팟','택배기사','고양이',
    '세탁기','전봇대','참외','맥북','우산','국밥','클립','변기','리모컨','볼펜',
    '멸치','마우스패드','이어폰','공기청정기','고구마','쓰레기통','프린터','수건',
    '삼겹살','치약','버스기사','양말',
    '김치찌개','순두부찌개','돈까스','육회','고등어구이','불닭','빨뚜','새로',
    '떡볶이','라볶이','치킨','곱창','막창','연어회','참치회','낙지볶음',
    '된장찌개','부대찌개','감자탕','설렁탕','해장국','비빔밥','냉면','막국수',
    '쭈꾸미','오삼불고기','제육볶음','닭갈비','갈비탕','순대국','콩나물국',
    '파전','녹두전','동동주','막걸리','소맥','하이볼','아이스아메리카노',
    '붕어빵','호떡','국화빵','타코야키','마라탕','마라샹궈','훠궈'
  ];
  const stored = sessionStorage.getItem('obliterate_nickname');
  let nick;
  if (stored) {
    nick = stored;
  } else {
    const adj = ADJS[Math.floor(Math.random() * ADJS.length)];
    const noun = NOUNS[Math.floor(Math.random() * NOUNS.length)];
    nick = adj + ' ' + noun;
    sessionStorage.setItem('obliterate_nickname', nick);
  }
  window._nickname = nick;
  document.getElementById('nickname').textContent = nick;
})();

function applyLang() {
  const L = LANG[lang];
  const bar = document.getElementById('modeBar');
  // 타노스 버튼은 유지하고 모드 버튼만 교체
  bar.querySelectorAll('.modeBtn').forEach(b => b.remove());
  const thanosBtn = document.getElementById('thanosToggle');
  modeKeys.forEach((k, i) => {
    const b = document.createElement('button');
    b.className = 'modeBtn' + (k === mode ? ' active' : '');
    b.textContent = L.modes[i];
    b.dataset.mode = k;
    b.addEventListener('click', () => {
      mode = k;
      document.querySelectorAll('.modeBtn').forEach(x => x.classList.remove('active'));
      b.classList.add('active');
    });
    bar.insertBefore(b, thanosBtn);
  });
  thanosBtn.textContent = thanosMode ? L.thanosOn : L.thanosOff;
  const inp = document.getElementById('textInput');
  inp.placeholder = L.placeholder;
  document.getElementById('spawnBtn').textContent = L.spawn;
  document.getElementById('destroyBtn').textContent = L.destroy;
  document.getElementById('hint').textContent = L.hint;
  // re-render online count in new lang
  const oc = document.getElementById('onlineCount');
  if (oc && oc.textContent) {
    const m = oc.textContent.match(/\d+/);
    if (m) updateOnlineCount(parseInt(m[0], 10));
  }
}

document.querySelectorAll('.langBtn').forEach(b => {
  b.addEventListener('click', () => {
    lang = b.dataset.lang;
    document.querySelectorAll('.langBtn').forEach(x => x.classList.remove('active'));
    b.classList.add('active');
    applyLang();
    spawnText(LANG[lang].defaultText);
  });
});

applyLang();

/* ── CANVAS SETUP ── */
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
let W, H, dpr;

function resize() {
  dpr = Math.min(window.devicePixelRatio || 1, 2);
  W = window.innerWidth;
  H = window.innerHeight;
  canvas.width = Math.round(W * dpr);
  canvas.height = Math.round(H * dpr);
  canvas.style.width = W + 'px';
  canvas.style.height = H + 'px';
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
}
resize();
window.addEventListener('resize', () => { resize(); });

/* ── MOUSE / TOUCH ── */
let mouse = { x: -9999, y: -9999 };
function setMouse(e) {
  const src = e.touches ? e.touches[0] : e;
  mouse.x = src.clientX; mouse.y = src.clientY;
}
canvas.addEventListener('mousemove', setMouse);
canvas.addEventListener('mouseleave', () => { mouse.x = -9999; mouse.y = -9999; });
canvas.addEventListener('touchmove', e => { e.preventDefault(); setMouse(e); }, { passive: false });
canvas.addEventListener('touchend', () => { mouse.x = -9999; mouse.y = -9999; });

/* ── HELPERS ── */
function measureChar(ch, font) {
  ctx.save(); ctx.font = font;
  const w = ctx.measureText(ch).width;
  ctx.restore(); return w;
}

const COLORS = ['#ff6b5b','#ffb347','#ffe066','#a8edea','#88d8b0','#c9b1ff','#ff9ff3','#54a0ff','#ff6b81','#ffffff','#f093fb','#4facfe'];

/* ── GLYPH ── */
class Glyph {
  constructor(ch, x, y, fs, color, owner) {
    this.ch = ch; this.x = x; this.y = y;
    this.ox = x; this.oy = y;
    this.fs = fs; this.color = color;
    this.owner = owner || window._nickname;
    this.font = `${fs}px Georgia, serif`;
    this.w = measureChar(ch, this.font);
    this.alpha = 0; this.scale = 0.2;
    this.alive = true; this.spawning = true; this.st = 0;
    this.dead = false;
    this.vx = 0; this.vy = 0; this.rot = 0; this.rotV = 0;
  }
  hover() {
    const dx = mouse.x - this.x, dy = mouse.y - this.y;
    return Math.abs(dx) < this.w/2 + 10 && Math.abs(dy) < this.fs/2 + 10;
  }
  kill() {
    if (this.dead) return; this.dead = true; this.spawning = false;
    const spd = 3 + Math.random()*7, a = Math.random()*Math.PI*2;
    if (mode==='explode') { this.vx=Math.cos(a)*spd*1.6; this.vy=Math.sin(a)*spd*1.6-4; }
    else if (mode==='burn') { this.vx=(Math.random()-.5)*2; this.vy=-(spd*.8+Math.random()*3); }
    else if (mode==='void') { this.vx=(this.ox-W/2)*.025; this.vy=(this.oy-H/2)*.025; }
    else { this.vx=Math.cos(a)*spd*1.6; this.vy=Math.sin(a)*spd*1.6; this.rotV=(Math.random()-.5)*.35; }
    const n = mode==='burn' ? 14 : 9;
    for (let i=0;i<n;i++) particles.push(new Particle(this.x, this.y, this.color, mode));
  }
  update() {
    if (this.spawning) {
      this.st += .08; this.alpha = Math.min(1, this.st); this.scale = Math.min(1, .2+this.st*1.3);
      if (this.st > .95) this.spawning = false;
    } else if (this.dead) {
      if (mode==='void') { this.scale*=.87; this.alpha*=.87; this.vx*=.95; this.vy*=.95; }
      else if (mode==='burn') { this.alpha-=.032; this.vx*=.98; this.scale=Math.max(0,this.scale-.018); }
      else { this.vy+=.38; this.vx*=.98; this.alpha-=.02; this.rot+=this.rotV; }
      this.x+=this.vx; this.y+=this.vy;
      if (this.alpha<=0 || this.y>H+120 || this.x<-200 || this.x>W+200) this.alive=false;
    } else { if (this.hover() && (thanosMode || this.owner === window._nickname)) this.kill(); }
  }
  draw() {
    if (!this.alive || this.alpha<=0) return;
    ctx.save();
    ctx.globalAlpha = Math.max(0,this.alpha);
    ctx.translate(this.x, this.y); ctx.rotate(this.rot); ctx.scale(this.scale, this.scale);
    ctx.font = this.font; ctx.fillStyle = this.color;
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    if (mode==='burn' && this.dead) { ctx.shadowColor='#ff4400'; ctx.shadowBlur=14; }
    ctx.fillText(this.ch, 0, 0);
    ctx.restore();
  }
}

/* ── PARTICLE ── */
class Particle {
  constructor(x,y,color,mode) {
    this.x=x; this.y=y; this.mode=mode;
    const a=Math.random()*Math.PI*2, spd=2+Math.random()*6;
    if (mode==='burn') { this.vx=(Math.random()-.5)*2.5; this.vy=-(2.5+Math.random()*5); this.sz=1.5+Math.random()*3; this.color=`hsl(${15+Math.random()*50},100%,${48+Math.random()*32}%)`; }
    else { const m=mode==='shatter'?2:1; this.vx=Math.cos(a)*spd*m; this.vy=Math.sin(a)*spd*m-(mode==='explode'?2:0); this.sz=1.5+Math.random()*3.5; this.color=color; }
    this.alpha=.85+Math.random()*.15; this.alive=true;
  }
  update() {
    if (this.mode==='burn') { this.vy-=.07; this.vx*=.97; this.sz*=.955; }
    else { this.vy+=.22; this.vx*=.97; }
    this.x+=this.vx; this.y+=this.vy; this.alpha-=.023;
    if (this.alpha<=0||this.sz<.25) this.alive=false;
  }
  draw() {
    if (!this.alive) return;
    ctx.save(); ctx.globalAlpha=this.alpha; ctx.fillStyle=this.color;
    ctx.beginPath(); ctx.arc(this.x,this.y,this.sz,0,Math.PI*2); ctx.fill(); ctx.restore();
  }
}

function filterProfanity(text) {
  let result = text;
  PROFANITY_KO.forEach(word => {
    const re = new RegExp(word, 'gi');
    result = result.replace(re, '**');
  });
  // -년 으로 끝나는 욕설 (작년·내년·금년·수년·몇년 등 연도 관련 단어 제외)
  result = result.replace(/(?<![작내금수몇])[가-힣]*년/g, '**');
  PROFANITY_EN.forEach(word => {
    const re = new RegExp('\\b' + word + '\\b', 'gi');
    result = result.replace(re, '**');
  });
  return result;
}

/* ── SPAWN TEXT (multiline) ── */
let particles=[], glyphs=[], lastText=LANG[lang].defaultText;

function spawnText(raw, owner) {
  if (raw != null) lastText = raw;
  const text = filterProfanity((raw != null) ? raw : lastText);
  const spawnOwner = owner || window._nickname;
  const lines = text.split('\n').filter(l => l.length > 0);
  if (!lines.length) return;

  const panelH = document.getElementById('panel').getBoundingClientRect().height;
  const safeTop = 56 + 16;
  const safeBottom = H - panelH - 16;
  const safeLeft = W * 0.10;
  const safeRight = W * 0.90;
  const availW = safeRight - safeLeft;
  const availH = safeBottom - safeTop;

  const maxCharsInLine = Math.max(...lines.map(l => [...l].length));

  // Smaller cap so multiple clusters coexist without dominating the screen
  const maxFs = W < 500 ? 36 : 48;
  let fs = Math.min(
    Math.floor(availW / Math.max(maxCharsInLine * 0.62, 1)),
    Math.floor(availH / (lines.length * 1.55)),
    maxFs
  );
  fs = Math.max(18, Math.min(fs, maxFs));

  const lineH = fs * 1.5;
  const totalTextH = lines.length * lineH;

  const font = `${fs}px Georgia, serif`;
  let maxLineW = 0;
  const lineWidths = lines.map(line => {
    let w = 0;
    [...line].forEach(c => { w += measureChar(c, font); });
    if (w > maxLineW) maxLineW = w;
    return w;
  });

  // Randomized scatter placement — clamp so cluster stays within safe area
  const minCX = safeLeft + maxLineW / 2;
  const maxCX = safeRight - maxLineW / 2;
  const centerX = minCX + Math.random() * Math.max(0, maxCX - minCX);

  const minCY = safeTop + totalTextH / 2;
  const maxCY = safeBottom - totalTextH / 2;
  const centerY = minCY + Math.random() * Math.max(0, maxCY - minCY);

  const startY = centerY - totalTextH / 2 + lineH / 2;

  const startLen = glyphs.length;
  let clusterIdx = 0;
  lines.forEach((line, li) => {
    const chars = [...line];
    const cws = chars.map(c => measureChar(c, font));
    const lineW = lineWidths[li];
    let cx = centerX - lineW / 2;
    const baseY = startY + li * lineH;

    chars.forEach((c, ci) => {
      const gx = cx + cws[ci] / 2;
      const gy = baseY;
      const g = new Glyph(c, gx, gy, fs, COLORS[(startLen + clusterIdx) % COLORS.length], spawnOwner);
      g.st = -(clusterIdx * 0.06);
      glyphs.push(g);
      cx += cws[ci];
      clusterIdx++;
    });
  });
}

function destroyAll(owner) {
  if (thanosMode) {
    glyphs.forEach(g => g.kill());
  } else {
    const target = owner || window._nickname;
    glyphs.filter(g => g.owner === target).forEach(g => g.kill());
  }
}

/* ── RENDER LOOP ── */
function loop() {
  ctx.fillStyle='rgba(7,7,13,0.22)';
  ctx.fillRect(0,0,W,H);
  particles = particles.filter(p=>p.alive);
  particles.forEach(p=>{p.update();p.draw();});
  glyphs.forEach(g=>{g.update();g.draw();});
  glyphs = glyphs.filter(g=>g.alive||!g.dead);
  requestAnimationFrame(loop);
}

spawnText(lastText);
loop();

// ── THANOS TOGGLE ──
const _thanosPressLog = [];
let _thanosBlockedUntil = 0;
let _thanosBlockTimer = null;

document.getElementById('thanosToggle').addEventListener('click', () => {
  const now = Date.now();

  // 차단 중이면 남은 시간 표시 후 무시
  if (now < _thanosBlockedUntil) {
    const sec = Math.ceil((_thanosBlockedUntil - now) / 1000);
    addThanosLog('⚠', LANG[lang].thanosBlocked(sec));
    return;
  }

  // 1분 이내 클릭만 남기기
  const oneMinAgo = now - 60 * 1000;
  while (_thanosPressLog.length && _thanosPressLog[0] < oneMinAgo) _thanosPressLog.shift();
  _thanosPressLog.push(now);

  // 1분 내 3회 이상이면 5분 차단
  if (_thanosPressLog.length >= 3) {
    _thanosBlockedUntil = now + 5 * 60 * 1000;
    _thanosPressLog.length = 0;

    // 타노스 모드 강제 OFF
    if (thanosMode) {
      thanosMode = false;
      const btn = document.getElementById('thanosToggle');
      btn.classList.remove('active');
      btn.textContent = LANG[lang].thanosOff;
      if (window._room) {
        window._room.send({ type: 'broadcast', event: 'thanos_toggle',
          payload: { nickname: window._nickname, on: false } });
      }
    }

    // 버튼 비활성화 + 카운트다운
    const btn = document.getElementById('thanosToggle');
    btn.disabled = true;
    btn.style.opacity = '0.4';
    const tick = () => {
      const rem = Math.ceil((_thanosBlockedUntil - Date.now()) / 1000);
      if (rem <= 0) {
        btn.disabled = false;
        btn.style.opacity = '';
        btn.textContent = LANG[lang].thanosOff;
        _thanosBlockTimer = null;
      } else {
        btn.textContent = `🔱 ${rem}s`;
        _thanosBlockTimer = setTimeout(tick, 1000);
      }
    };
    tick();
    addThanosLog('⚠', LANG[lang].thanosBlocked(300));
    return;
  }

  thanosMode = !thanosMode;
  const btn = document.getElementById('thanosToggle');
  btn.classList.toggle('active', thanosMode);
  btn.textContent = thanosMode ? LANG[lang].thanosOn : LANG[lang].thanosOff;
  addThanosLog(window._nickname, thanosMode);
  if (window._room) {
    window._room.send({
      type: 'broadcast', event: 'thanos_toggle',
      payload: { nickname: window._nickname, on: thanosMode }
    });
  }
});

// ── THANOS LOG ──
function addThanosLog(nick, isOn) {
  const log = document.getElementById('thanosLog');
  const el = document.createElement('div');
  el.className = 'thanos-log-entry';
  el.textContent = typeof isOn === 'string' ? isOn : (isOn ? LANG[lang].thanosLogOn(nick) : LANG[lang].thanosLogOff(nick));
  log.appendChild(el);
  requestAnimationFrame(() => el.classList.add('visible'));
  while (log.children.length > 20) log.removeChild(log.firstChild);
  setTimeout(() => {
    el.classList.remove('visible');
    setTimeout(() => el.remove(), 350);
  }, 8000);
}

// Step 3: Ghost notification helper
function showNotification(nick, eventType) {
  if (nick === window._nickname) return; // skip own actions
  const el = document.createElement('div');
  el.className = 'ghost-notif';
  if (lang === 'ko') {
    el.textContent = eventType === 'spawn'
      ? `${nick}이 소환했습니다`
      : `${nick}이 전부 파괴했습니다`;
  } else {
    el.textContent = eventType === 'spawn'
      ? `${nick} spawned`
      : `${nick} destroyed all`;
  }
  document.getElementById('app').appendChild(el);
  requestAnimationFrame(() => {
    el.style.opacity = '1';
    setTimeout(() => {
      el.style.transition = 'opacity 0.3s';
      el.style.opacity = '0';
      setTimeout(() => el.remove(), 300);
    }, 2000);
  });
}

function updateOnlineCount(count) {
  const el = document.getElementById('onlineCount');
  if (!el) return;
  el.textContent = lang === 'ko' ? `● ${count}명 ▾` : `● ${count} online ▾`;
}

function renderPresenceDropdown() {
  const dd = document.getElementById('presenceDropdown');
  if (!dd) return;
  dd.innerHTML = '';
  _presenceNicks.forEach(nick => {
    const div = document.createElement('div');

    const dot = document.createElement('span');
    dot.className = 'presence-dot';
    div.appendChild(dot);
    div.appendChild(document.createTextNode(nick));
    dd.appendChild(div);
  });
}

document.getElementById('onlineCount').addEventListener('click', e => {
