<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>OBLITERATE</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  width: 100%; height: 100%;
  overflow: hidden;
  background: #07070d;
  font-family: 'Georgia', serif;
}

#app {
  width: 100vw;
  height: 100vh;
  height: 100dvh;
  display: flex;
  flex-direction: column;
  background: #07070d;
  position: relative;
  overflow: hidden;
}

/* ── TOP BAR ── */
#topBar {
  position: absolute;
  top: 0; left: 0; right: 0;
  z-index: 10;
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: clamp(10px, 2vw, 18px) clamp(14px, 3vw, 28px);
  background: linear-gradient(to bottom, rgba(7,7,13,0.95) 60%, transparent);
  pointer-events: none;
}

#title {
  font-family: 'Courier New', monospace;
  font-size: clamp(11px, 1.5vw, 13px);
  letter-spacing: 4px;
  color: rgba(255,255,255,0.18);
  text-transform: uppercase;
  pointer-events: none;
  user-select: none;
}

#langToggle {
  display: flex;
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 20px;
  overflow: hidden;
  background: rgba(255,255,255,0.03);
  pointer-events: all;
}
.langBtn {
  padding: 5px 14px;
  font-size: 10px;
  letter-spacing: 1.2px;
  cursor: pointer;
  border: none;
  background: transparent;
  color: rgba(255,255,255,0.28);
  transition: all 0.15s;
  text-transform: uppercase;
  font-family: 'Courier New', monospace;
}
.langBtn.active { background: rgba(255,255,255,0.09); color: rgba(255,255,255,0.85); }

/* ── CANVAS ── */
#canvas {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
  cursor: crosshair;
  display: block;
  touch-action: none;
}

/* ── BOTTOM PANEL ── */
#panel {
  position: absolute;
  bottom: 0; left: 0; right: 0;
  z-index: 10;
  padding: clamp(10px, 2vw, 20px) clamp(14px, 3vw, 28px);
  padding-bottom: calc(clamp(10px, 2vw, 20px) + env(safe-area-inset-bottom, 0px));
  background: linear-gradient(to top, rgba(7,7,13,0.97) 55%, transparent);
  display: flex;
  flex-direction: column;
  gap: 10px;
}

/* mode buttons */
#modeBar {
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
}
.modeBtn {
  padding: 4px clamp(9px, 1.8vw, 14px);
  border-radius: 20px;
  border: 1px solid rgba(255,255,255,0.1);
  background: transparent;
  color: rgba(255,255,255,0.32);
  font-size: clamp(9px, 1.3vw, 11px);
  letter-spacing: 0.8px;
  cursor: pointer;
  text-transform: uppercase;
  transition: all 0.15s;
  font-family: 'Courier New', monospace;
}
.modeBtn.active {
  background: rgba(255,255,255,0.08);
  border-color: rgba(255,255,255,0.22);
  color: rgba(255,255,255,0.88);
}
.modeBtn:hover { border-color: rgba(255,255,255,0.2); color: rgba(255,255,255,0.6); }

/* input row */
#inputRow {
  display: flex;
  gap: 8px;
  align-items: flex-end;
  width: 100%;
}

#textInput {
  flex: 1;
  min-width: 0;
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 8px;
  color: #fff;
  font-size: clamp(13px, 2vw, 17px);
  padding: 9px 13px;
  outline: none;
  font-family: 'Georgia', serif;
  letter-spacing: 1.2px;
  resize: none;
  overflow-y: auto;
  max-height: clamp(80px, 15vh, 140px);
  line-height: 1.5;
  scrollbar-width: thin;
  scrollbar-color: rgba(255,255,255,0.1) transparent;
}
#textInput::placeholder { color: rgba(255,255,255,0.18); }
#textInput:focus { border-color: rgba(255,100,80,0.45); }

#btnCol {
  display: flex;
  flex-direction: column;
  gap: 6px;
  flex-shrink: 0;
}
.btn {
  padding: 8px clamp(10px, 2vw, 18px);
  border-radius: 7px;
  border: 1px solid rgba(255,255,255,0.13);
  background: rgba(255,255,255,0.04);
  color: rgba(255,255,255,0.65);
  font-size: clamp(9px, 1.3vw, 11px);
  letter-spacing: 1px;
  cursor: pointer;
  transition: all 0.15s;
  text-transform: uppercase;
  white-space: nowrap;
  font-family: 'Courier New', monospace;
}
.btn:hover { background: rgba(255,255,255,0.09); color: #fff; }
.btn.danger {
  border-color: rgba(255,55,55,0.35);
  background: rgba(255,30,30,0.06);
  color: rgba(255,110,90,0.88);
}
.btn.danger:hover { background: rgba(255,30,30,0.16); color: #ff6b5b; }

#hint {
  font-size: clamp(8px, 1.2vw, 10px);
  color: rgba(255,255,255,0.16);
  letter-spacing: 1.4px;
  text-transform: uppercase;
  font-family: 'Courier New', monospace;
}

/* ── MULTIPLAYER UI ── */
#topMeta {
  display: flex;
  align-items: center;
  gap: 12px;
}
#onlineCount, #nickname {
  font-family: 'Courier New', monospace;
  font-size: 10px;
  color: rgba(255,255,255,0.35);
  letter-spacing: 1.2px;
  white-space: nowrap;
  pointer-events: none;
  user-select: none;
}

/* ── INSERT AFTER: multiplayer UI styles ── */
/* Step 3: Ghost notification */
.ghost-notif {
  position: fixed;
  top: 56px;
  left: 50%;
  transform: translateX(-50%);
  background: rgba(255,255,255,0.07);
  border: 1px solid rgba(255,255,255,0.12);
  border-radius: 20px;
  padding: 5px 14px;
  font-family: 'Courier New', monospace;
  font-size: 10px;
  color: rgba(255,255,255,0.5);
  letter-spacing: 1.2px;
  pointer-events: none;
  z-index: 99;
  opacity: 0;
  transition: opacity 0.2s;
  white-space: nowrap;
}
</style>
</head>
<body>
<div id="app">
  <canvas id="canvas"></canvas>

  <div id="topBar">
    <div id="title">Obliterate</div>
    <div id="topMeta">
      <span id="onlineCount"></span>
      <span id="nickname"></span>
    </div>
    <div id="langToggle">
      <button class="langBtn active" data-lang="ko">한국어</button>
      <button class="langBtn" data-lang="en">English</button>
    </div>
  </div>

  <div id="panel">
    <div id="modeBar"></div>
    <div id="inputRow">
      <textarea id="textInput" rows="2" spellcheck="false"></textarea>
      <div id="btnCol">
        <button class="btn" id="spawnBtn"></button>
        <button class="btn danger" id="destroyBtn"></button>
      </div>
    </div>
    <div id="hint"></div>
  </div>
</div>

<script>
const LANG = {
  ko: {
    modes: ['💥 폭발','🔥 연소','🌀 소멸','❄ 파쇄'],
    placeholder: '파괴할 텍스트를 입력하세요\n여러 줄도 됩니다...',
    spawn: '소환',
    destroy: '전부 파괴',
    hint: '마우스를 글자 위에 올리면 파괴됩니다',
    defaultText: '스트레스여\n안녕',
  },
  en: {
    modes: ['💥 Explode','🔥 Burn','🌀 Void','❄ Shatter'],
    placeholder: 'Type something to obliterate...\nMultiple lines supported.',
    spawn: 'Spawn',
    destroy: 'Destroy All',
    hint: 'Hover over letters to destroy them',
    defaultText: 'GOODBYE\nSTRESS',
  }
};

let lang = 'ko', mode = 'explode';
const modeKeys = ['explode','burn','void','shatter'];

// ── INSERT AFTER: LANG/mode declarations ──
// Step 1: Nickname system
(function initNickname() {
  const ADJS = [
    '심심한','열받은','지친','억울한','신난','멍한','화난','설레는','졸린','배고픈',
    '무서운','슬픈','행복한','당황한','뻔뻔한','외로운','질투하는','황당한','뿌듯한','민망한',
    '짜증난','쑥스러운','긴장한','후회하는','그리운','두근거리는','불안한','허탈한','뭉클한','어이없는',
    '흥분한','지루한'
  ];
  const NOUNS = [
    '냉장고','두부','연필깎이','부처님','슬리퍼','에어팟','택배기사','고양이',
    '세탁기','전봇대','참외','맥북','우산','국밥','클립','변기','리모컨','볼펜',
    '멸치','마우스패드','이어폰','공기청정기','고구마','쓰레기통','프린터','수건',
    '삼겹살','치약','버스기사','양말'
  ];
  const stored = sessionStorage.getItem('obliterate_nickname');
  let nick;
  if (stored) {
    nick = stored;
  } else {
    const adj = ADJS[Math.floor(Math.random() * ADJS.length)];
    const noun = NOUNS[Math.floor(Math.random() * NOUNS.length)];
    nick = adj + ' ' + noun;
    sessionStorage.setItem('obliterate_nickname', nick);
  }
  window._nickname = nick;
  document.getElementById('nickname').textContent = nick;
})();

function applyLang() {
  const L = LANG[lang];
  const bar = document.getElementById('modeBar');
  bar.innerHTML = '';
  modeKeys.forEach((k, i) => {
    const b = document.createElement('button');
    b.className = 'modeBtn' + (k === mode ? ' active' : '');
    b.textContent = L.modes[i];
    b.dataset.mode = k;
    b.addEventListener('click', () => {
      mode = k;
      document.querySelectorAll('.modeBtn').forEach(x => x.classList.remove('active'));
      b.classList.add('active');
    });
    bar.appendChild(b);
  });
  const inp = document.getElementById('textInput');
  inp.placeholder = L.placeholder;
  document.getElementById('spawnBtn').textContent = L.spawn;
  document.getElementById('destroyBtn').textContent = L.destroy;
  document.getElementById('hint').textContent = L.hint;
  // re-render online count in new lang
  const oc = document.getElementById('onlineCount');
  if (oc && oc.textContent) {
    const m = oc.textContent.match(/\d+/);
    if (m) updateOnlineCount(parseInt(m[0], 10));
  }
}

document.querySelectorAll('.langBtn').forEach(b => {
  b.addEventListener('click', () => {
    lang = b.dataset.lang;
    document.querySelectorAll('.langBtn').forEach(x => x.classList.remove('active'));
    b.classList.add('active');
    applyLang();
    spawnText(LANG[lang].defaultText);
  });
});

applyLang();

/* ── CANVAS SETUP ── */
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
let W, H, dpr;

function resize() {
  dpr = Math.min(window.devicePixelRatio || 1, 2);
  W = window.innerWidth;
  H = window.innerHeight;
  canvas.width = Math.round(W * dpr);
  canvas.height = Math.round(H * dpr);
  canvas.style.width = W + 'px';
  canvas.style.height = H + 'px';
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
}
resize();
window.addEventListener('resize', () => { resize(); });

/* ── MOUSE / TOUCH ── */
let mouse = { x: -9999, y: -9999 };
function setMouse(e) {
  const src = e.touches ? e.touches[0] : e;
  mouse.x = src.clientX; mouse.y = src.clientY;
}
canvas.addEventListener('mousemove', setMouse);
canvas.addEventListener('mouseleave', () => { mouse.x = -9999; mouse.y = -9999; });
canvas.addEventListener('touchmove', e => { e.preventDefault(); setMouse(e); }, { passive: false });
canvas.addEventListener('touchend', () => { mouse.x = -9999; mouse.y = -9999; });

/* ── HELPERS ── */
function measureChar(ch, font) {
  ctx.save(); ctx.font = font;
  const w = ctx.measureText(ch).width;
  ctx.restore(); return w;
}

const COLORS = ['#ff6b5b','#ffb347','#ffe066','#a8edea','#88d8b0','#c9b1ff','#ff9ff3','#54a0ff','#ff6b81','#ffffff','#f093fb','#4facfe'];

/* ── GLYPH ── */
class Glyph {
  constructor(ch, x, y, fs, color) {
    this.ch = ch; this.x = x; this.y = y;
    this.ox = x; this.oy = y;
    this.fs = fs; this.color = color;
    this.font = `${fs}px Georgia, serif`;
    this.w = measureChar(ch, this.font);
    this.alpha = 0; this.scale = 0.2;
    this.alive = true; this.spawning = true; this.st = 0;
    this.dead = false;
    this.vx = 0; this.vy = 0; this.rot = 0; this.rotV = 0;
  }
  hover() {
    const dx = mouse.x - this.x, dy = mouse.y - this.y;
    return Math.abs(dx) < this.w/2 + 10 && Math.abs(dy) < this.fs/2 + 10;
  }
  kill() {
    if (this.dead) return; this.dead = true; this.spawning = false;
    const spd = 3 + Math.random()*7, a = Math.random()*Math.PI*2;
    if (mode==='explode') { this.vx=Math.cos(a)*spd*1.6; this.vy=Math.sin(a)*spd*1.6-4; }
    else if (mode==='burn') { this.vx=(Math.random()-.5)*2; this.vy=-(spd*.8+Math.random()*3); }
    else if (mode==='void') { this.vx=(this.ox-W/2)*.025; this.vy=(this.oy-H/2)*.025; }
    else { this.vx=Math.cos(a)*spd*1.6; this.vy=Math.sin(a)*spd*1.6; this.rotV=(Math.random()-.5)*.35; }
    const n = mode==='burn' ? 14 : 9;
    for (let i=0;i<n;i++) particles.push(new Particle(this.x, this.y, this.color, mode));
  }
  update() {
    if (this.spawning) {
      this.st += .08; this.alpha = Math.min(1, this.st); this.scale = Math.min(1, .2+this.st*1.3);
      if (this.st > .95) this.spawning = false;
    } else if (this.dead) {
      if (mode==='void') { this.scale*=.87; this.alpha*=.87; this.vx*=.95; this.vy*=.95; }
      else if (mode==='burn') { this.alpha-=.032; this.vx*=.98; this.scale=Math.max(0,this.scale-.018); }
      else { this.vy+=.38; this.vx*=.98; this.alpha-=.02; this.rot+=this.rotV; }
      this.x+=this.vx; this.y+=this.vy;
      if (this.alpha<=0 || this.y>H+120 || this.x<-200 || this.x>W+200) this.alive=false;
    } else { if (this.hover()) this.kill(); }
  }
  draw() {
    if (!this.alive || this.alpha<=0) return;
    ctx.save();
    ctx.globalAlpha = Math.max(0,this.alpha);
    ctx.translate(this.x, this.y); ctx.rotate(this.rot); ctx.scale(this.scale, this.scale);
    ctx.font = this.font; ctx.fillStyle = this.color;
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    if (mode==='burn' && this.dead) { ctx.shadowColor='#ff4400'; ctx.shadowBlur=14; }
    ctx.fillText(this.ch, 0, 0);
    ctx.restore();
  }
}

/* ── PARTICLE ── */
class Particle {
  constructor(x,y,color,mode) {
    this.x=x; this.y=y; this.mode=mode;
    const a=Math.random()*Math.PI*2, spd=2+Math.random()*6;
    if (mode==='burn') { this.vx=(Math.random()-.5)*2.5; this.vy=-(2.5+Math.random()*5); this.sz=1.5+Math.random()*3; this.color=`hsl(${15+Math.random()*50},100%,${48+Math.random()*32}%)`; }
    else { const m=mode==='shatter'?2:1; this.vx=Math.cos(a)*spd*m; this.vy=Math.sin(a)*spd*m-(mode==='explode'?2:0); this.sz=1.5+Math.random()*3.5; this.color=color; }
    this.alpha=.85+Math.random()*.15; this.alive=true;
  }
  update() {
    if (this.mode==='burn') { this.vy-=.07; this.vx*=.97; this.sz*=.955; }
    else { this.vy+=.22; this.vx*=.97; }
    this.x+=this.vx; this.y+=this.vy; this.alpha-=.023;
    if (this.alpha<=0||this.sz<.25) this.alive=false;
  }
  draw() {
    if (!this.alive) return;
    ctx.save(); ctx.globalAlpha=this.alpha; ctx.fillStyle=this.color;
    ctx.beginPath(); ctx.arc(this.x,this.y,this.sz,0,Math.PI*2); ctx.fill(); ctx.restore();
  }
}

/* ── SPAWN TEXT (multiline) ── */
let particles=[], glyphs=[], lastText=LANG[lang].defaultText;

function spawnText(raw) {
  if (raw != null) lastText = raw;
  const text = (raw != null) ? raw : lastText;
  const lines = text.split('\n').filter(l => l.length > 0);
  if (!lines.length) return;

  const panelH = document.getElementById('panel').getBoundingClientRect().height;
  const safeTop = 56 + 16;
  const safeBottom = H - panelH - 16;
  const safeLeft = W * 0.10;
  const safeRight = W * 0.90;
  const availW = safeRight - safeLeft;
  const availH = safeBottom - safeTop;

  const maxCharsInLine = Math.max(...lines.map(l => [...l].length));

  // Smaller cap so multiple clusters coexist without dominating the screen
  const maxFs = W < 500 ? 36 : 48;
  let fs = Math.min(
    Math.floor(availW / Math.max(maxCharsInLine * 0.62, 1)),
    Math.floor(availH / (lines.length * 1.55)),
    maxFs
  );
  fs = Math.max(18, Math.min(fs, maxFs));

  const lineH = fs * 1.5;
  const totalTextH = lines.length * lineH;

  const font = `${fs}px Georgia, serif`;
  let maxLineW = 0;
  const lineWidths = lines.map(line => {
    let w = 0;
    [...line].forEach(c => { w += measureChar(c, font); });
    if (w > maxLineW) maxLineW = w;
    return w;
  });

  // Randomized scatter placement — clamp so cluster stays within safe area
  const minCX = safeLeft + maxLineW / 2;
  const maxCX = safeRight - maxLineW / 2;
  const centerX = minCX + Math.random() * Math.max(0, maxCX - minCX);

  const minCY = safeTop + totalTextH / 2;
  const maxCY = safeBottom - totalTextH / 2;
  const centerY = minCY + Math.random() * Math.max(0, maxCY - minCY);

  const startY = centerY - totalTextH / 2 + lineH / 2;

  const startLen = glyphs.length;
  let clusterIdx = 0;
  lines.forEach((line, li) => {
    const chars = [...line];
    const cws = chars.map(c => measureChar(c, font));
    const lineW = lineWidths[li];
    let cx = centerX - lineW / 2;
    const baseY = startY + li * lineH;

    chars.forEach((c, ci) => {
      const gx = cx + cws[ci] / 2;
      const gy = baseY;
      const g = new Glyph(c, gx, gy, fs, COLORS[(startLen + clusterIdx) % COLORS.length]);
      g.st = -(clusterIdx * 0.06);
      glyphs.push(g);
      cx += cws[ci];
      clusterIdx++;
    });
  });
}

function destroyAll() {
  glyphs.forEach(g => g.kill());
}

// ── INSERT AFTER: spawnBtn / destroyBtn — now also broadcast ──
document.getElementById('spawnBtn').addEventListener('click', () => {
  const text = document.getElementById('textInput').value;
  spawnText(text);
  if (window._room) {
    window._room.send({
      type: 'broadcast', event: 'spawn',
      payload: { text, nickname: window._nickname, lang, mode }
    });
  }
});
document.getElementById('destroyBtn').addEventListener('click', () => {
  destroyAll();
  if (window._room) {
    window._room.send({
      type: 'broadcast', event: 'destroy_all',
      payload: { nickname: window._nickname }
    });
  }
});
document.getElementById('textInput').addEventListener('keydown', e => {
  if (e.key==='Enter' && !e.shiftKey) {
    e.preventDefault();
    const text = e.target.value;
    spawnText(text);
    if (window._room) {
      window._room.send({
        type: 'broadcast', event: 'spawn',
        payload: { text, nickname: window._nickname, lang, mode }
      });
    }
  }
});

/* ── RENDER LOOP ── */
function loop() {
  ctx.fillStyle='rgba(7,7,13,0.22)';
  ctx.fillRect(0,0,W,H);
  particles = particles.filter(p=>p.alive);
  particles.forEach(p=>{p.update();p.draw();});
  glyphs.forEach(g=>{g.update();g.draw();});
  glyphs = glyphs.filter(g=>g.alive||!g.dead);
  requestAnimationFrame(loop);
}

spawnText(lastText);
loop();

// ── INSERT AFTER: loop() — Steps 2/3/4 Supabase Realtime ──

// Step 3: Ghost notification helper
function showNotification(nick, eventType) {
  if (nick === window._nickname) return; // skip own actions
  const el = document.createElement('div');
  el.className = 'ghost-notif';
  if (lang === 'ko') {
    el.textContent = eventType === 'spawn'
      ? `${nick}이 소환했습니다`
      : `${nick}이 전부 파괴했습니다`;
  } else {
    el.textContent = eventType === 'spawn'
      ? `${nick} spawned`
      : `${nick} destroyed all`;
  }
  document.getElementById('app').appendChild(el);
  requestAnimationFrame(() => {
    el.style.opacity = '1';
    setTimeout(() => {
      el.style.transition = 'opacity 0.3s';
      el.style.opacity = '0';
      setTimeout(() => el.remove(), 300);
    }, 2000);
  });
}

// Step 4: Update online count display
function updateOnlineCount(count) {
  const el = document.getElementById('onlineCount');
  if (!el) return;
  el.textContent = lang === 'ko' ? `● ${count}명` : `● ${count} online`;
}

// Step 2: Supabase init — runs after CDN script loads
