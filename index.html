<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, interactive-widget=resizes-visual">
<title>OBLITERATE</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  width: 100%; height: 100%;
  overflow: hidden;
  background: #07070d;
  font-family: 'Georgia', serif;
}

#app {
  width: 100vw;
  height: 100vh;
  height: 100dvh;
  display: flex;
  flex-direction: column;
  background: #07070d;
  position: relative;
  overflow: hidden;
}

/* ── TOP BAR ── */
#topBar {
  position: absolute;
  top: 0; left: 0; right: 0;
  z-index: 10;
  display: grid;
  grid-template-columns: 1fr auto 1fr;
  align-items: flex-start;
  padding: clamp(10px, 2vw, 18px) clamp(14px, 3vw, 28px);
  background: linear-gradient(to bottom, rgba(7,7,13,0.95) 60%, transparent);
  pointer-events: none;
}

#topLeft {
  display: flex;
  align-items: center;
  gap: 12px;
}

#topCenter {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 0;
}

#topRight {
  display: flex;
  align-items: center;
  gap: 8px;
  justify-content: flex-end;
}

#title {
  font-family: 'Courier New', monospace;
  font-size: clamp(11px, 1.5vw, 13px);
  letter-spacing: 4px;
  color: rgba(255,255,255,0.18);
  text-transform: uppercase;
  pointer-events: none;
  user-select: none;
}

#langToggle {
  display: flex;
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 20px;
  overflow: hidden;
  background: rgba(255,255,255,0.03);
  pointer-events: all;
}
.langBtn {
  padding: 5px 14px;
  font-size: 10px;
  letter-spacing: 1.2px;
  cursor: pointer;
  border: none;
  background: transparent;
  color: rgba(255,255,255,0.28);
  transition: all 0.15s;
  text-transform: uppercase;
  font-family: 'Courier New', monospace;
}
.langBtn.active { background: rgba(255,255,255,0.09); color: rgba(255,255,255,0.85); }

/* ── THEME SWITCH ── */
#themeSwitch {
  width: 48px;
  height: 26px;
  border-radius: 13px;
  border: 1px solid rgba(255,255,255,0.15);
  background: rgba(30,30,50,0.6);
  cursor: pointer;
  position: relative;
  pointer-events: all;
  transition: background 0.2s, border-color 0.2s;
  display: flex;
  align-items: center;
  padding: 0 3px;
  flex-shrink: 0;
}
#themeSwitchKnob {
  width: 20px;
  height: 20px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 12px;
  transition: transform 0.25s cubic-bezier(.4,0,.2,1);
  user-select: none;
  line-height: 1;
}
html.light #themeSwitch {
  background: rgba(200,190,170,0.5);
  border-color: rgba(0,0,0,0.15);
}
html.light #themeSwitchKnob {
  transform: translateX(22px);
}

/* ── LIGHT MODE ── */
html.light, html.light body, html.light #app {
  background: #f0ede8;
}
html.light #topBar {
  background: linear-gradient(to bottom, rgba(240,237,232,0.97) 60%, transparent);
}
html.light #panel {
  background: linear-gradient(to top, rgba(240,237,232,0.99) 55%, transparent);
}
html.light #title {
  color: rgba(0,0,0,0.50);
}
html.light #onlineCount, html.light #nickname {
  color: rgba(0,0,0,0.65);
}
html.light #langToggle {
  border-color: rgba(0,0,0,0.12);
  background: rgba(0,0,0,0.03);
}
html.light .langBtn {
  color: rgba(0,0,0,0.65);
}
html.light .langBtn.active {
  background: rgba(0,0,0,0.08);
  color: rgba(0,0,0,0.82);
}
/* themeSwitch light styles handled above */
html.light #infoBtn {
  border-color: rgba(0,0,0,0.12);
  color: rgba(0,0,0,0.65);
}
html.light #infoBtn:hover {
  color: rgba(0,0,0,0.75);
  border-color: rgba(0,0,0,0.3);
}
html.light #textInput {
  background: rgba(0,0,0,0.05);
  border-color: rgba(0,0,0,0.12);
  color: #1a1a1a;
}
html.light #textInput::placeholder {
  color: rgba(0,0,0,0.45);
}
html.light #textInput:focus {
  border-color: rgba(200,50,30,0.4);
}
html.light .modeBtn {
  border-color: rgba(0,0,0,0.1);
  color: rgba(0,0,0,0.65);
}
html.light .modeBtn.active {
  background: rgba(0,0,0,0.07);
  border-color: rgba(0,0,0,0.22);
  color: rgba(0,0,0,0.85);
}
html.light .modeBtn:hover {
  border-color: rgba(0,0,0,0.2);
  color: rgba(0,0,0,0.6);
}
html.light .btn {
  border-color: rgba(0,0,0,0.13);
  background: rgba(0,0,0,0.04);
  color: rgba(0,0,0,0.72);
}
html.light .btn:hover {
  background: rgba(0,0,0,0.09);
  color: #000;
}
html.light .btn.danger {
  border-color: rgba(200,40,40,0.3);
  background: rgba(200,30,30,0.05);
  color: rgba(180,60,50,1);
}
html.light .btn.danger:hover {
  background: rgba(200,30,30,0.12);
  color: #c0392b;
}
html.light #lockBtn.active {
  background: rgba(180,140,0,0.12);
  border-color: rgba(180,140,0,0.5);
  color: rgba(140,100,0,1);
  box-shadow: 0 0 8px rgba(180,140,0,0.2);
}
html.light #hint {
  color: rgba(0,0,0,0.45);
}
html.light #thanosToggle {
  border-color: rgba(100,60,200,0.35);
  color: rgba(90,50,180,0.80);
}
html.light #thanosToggle:hover {
  border-color: rgba(100,60,200,0.55);
  color: rgba(90,50,180,0.92);
}
html.light #thanosToggle.active {
  background: rgba(90,40,200,0.1);
  border-color: rgba(130,80,220,0.5);
  color: rgba(80,40,180,0.92);
  box-shadow: 0 0 10px rgba(100,50,200,0.15);
}
html.light #thanosCooldown {
  color: rgba(100,60,200,0.88);
}

/* ── LIGHT MODE: sticky messages ── */
html.light .sticky-msg {
  background: hsla(var(--nick-hue, 50), 60%, 40%, 0.08);
  border-color: hsla(var(--nick-hue, 50), 60%, 40%, 0.28);
}
html.light .sticky-msg.mine {
  border-color: hsla(var(--nick-hue, 50), 60%, 35%, 0.45);
}
html.light .sticky-msg.mine:hover {
  background: hsla(var(--nick-hue, 50), 60%, 35%, 0.14);
  border-color: hsla(var(--nick-hue, 50), 60%, 35%, 0.65);
}
html.light .sticky-owner {
  color: hsla(var(--nick-hue, 50), 60%, 28%, 0.65);
}
html.light .sticky-text {
  color: hsla(var(--nick-hue, 50), 55%, 22%, 0.92);
}
html.light .sticky-msg.mine:hover .sticky-delete-hint {
  color: rgba(120,80,0,0.6);
}

/* ── INFO ICON ── */
#infoWrap {
  position: relative;
  pointer-events: all;
}
#infoBtn {
  background: none;
  border: 1px solid rgba(255,255,255,0.12);
  border-radius: 50%;
  width: 24px; height: 24px;
  display: flex; align-items: center; justify-content: center;
  color: rgba(255,255,255,0.3);
  font-size: 11px;
  cursor: pointer;
  font-family: 'Courier New', monospace;
  transition: all 0.15s;
  line-height: 1;
}
#infoBtn:hover { color: rgba(255,255,255,0.8); border-color: rgba(255,255,255,0.3); }
#infoTooltip {
  display: none;
  position: absolute;
  top: calc(100% + 8px);
  right: 0;
  min-width: 230px;
  background: rgba(10,10,18,0.97);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 10px;
  padding: 14px 16px;
  z-index: 300;
  backdrop-filter: blur(8px);
  box-shadow: 0 8px 24px rgba(0,0,0,0.5);
  font-family: 'Courier New', monospace;
  font-size: 9px;
  color: rgba(255,255,255,0.6);
  line-height: 1.8;
  letter-spacing: 0.8px;
  white-space: pre-line;
  pointer-events: none;
}
#infoWrap:hover #infoTooltip,
#infoWrap:focus-within #infoTooltip { display: block; }

/* ── CANVAS ── */
#canvas {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
  cursor: crosshair;
  display: block;
  touch-action: none;
}

/* ── BOTTOM PANEL ── */
#panel {
  position: absolute;
  bottom: 0; left: 0; right: 0;
  z-index: 10;
  padding: clamp(10px, 2vw, 20px) clamp(14px, 3vw, 28px);
  padding-bottom: calc(clamp(10px, 2vw, 20px) + env(safe-area-inset-bottom, 0px));
  background: linear-gradient(to top, rgba(7,7,13,0.97) 55%, transparent);
  display: flex;
  flex-direction: column;
  gap: 10px;
}

/* mode row */
#modeRow {
  display: flex;
  align-items: center;
  gap: 0;
}

/* mode buttons */
#modeBar {
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
  flex: 1;
}

#lockBtn {
  margin-left: 14px;
  flex-shrink: 0;
}
.modeBtn {
  padding: 4px clamp(9px, 1.8vw, 14px);
  border-radius: 20px;
  border: 1px solid rgba(255,255,255,0.1);
  background: transparent;
  color: rgba(255,255,255,0.32);
  font-size: clamp(9px, 1.3vw, 11px);
  letter-spacing: 0.8px;
  cursor: pointer;
  text-transform: uppercase;
  transition: all 0.15s;
  font-family: 'Courier New', monospace;
}
.modeBtn.active {
  background: rgba(255,255,255,0.08);
  border-color: rgba(255,255,255,0.22);
  color: rgba(255,255,255,0.88);
}
.modeBtn:hover { border-color: rgba(255,255,255,0.2); color: rgba(255,255,255,0.6); }

/* input row */
#inputRow {
  display: flex;
  gap: 8px;
  align-items: flex-end;
  width: 100%;
}

#textInput {
  flex: 1;
  min-width: 0;
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 8px;
  color: #fff;
  font-size: clamp(13px, 2vw, 17px);
  padding: 9px 13px;
  outline: none;
  font-family: 'Georgia', serif;
  letter-spacing: 1.2px;
  resize: none;
  overflow-y: auto;
  max-height: clamp(80px, 15vh, 140px);
  line-height: 1.5;
  scrollbar-width: thin;
  scrollbar-color: rgba(255,255,255,0.1) transparent;
}
#textInput::placeholder { color: rgba(255,255,255,0.18); }
#textInput:focus { border-color: rgba(255,100,80,0.45); }

#btnCol {
  display: flex;
  flex-direction: column;
  gap: 6px;
  flex-shrink: 0;
}
.btn {
  padding: 8px clamp(10px, 2vw, 18px);
  border-radius: 7px;
  border: 1px solid rgba(255,255,255,0.13);
  background: rgba(255,255,255,0.04);
  color: rgba(255,255,255,0.65);
  font-size: clamp(9px, 1.3vw, 11px);
  letter-spacing: 1px;
  cursor: pointer;
  transition: all 0.15s;
  text-transform: uppercase;
  white-space: nowrap;
  font-family: 'Courier New', monospace;
}
.btn:hover { background: rgba(255,255,255,0.09); color: #fff; }
.btn.danger {
  border-color: rgba(255,55,55,0.35);
  background: rgba(255,30,30,0.06);
  color: rgba(255,110,90,0.88);
}
.btn.danger:hover { background: rgba(255,30,30,0.16); color: #ff6b5b; }

#lockBtn {
  font-size: 14px;
  text-transform: none;
  letter-spacing: 0;
  padding: 5px 11px;
}
#lockBtn.active {
  background: rgba(255,220,50,0.15);
  border-color: rgba(255,220,50,0.55);
  color: rgba(255,220,50,1);
  box-shadow: 0 0 8px rgba(255,220,50,0.3);
}

/* ── STICKY MESSAGES ── */
#stickyContainer {
  position: absolute;
  left: clamp(10px, 2vw, 20px);
  top: 64px;
  bottom: 0;
  width: clamp(160px, 22vw, 240px);
  z-index: 8;
  display: flex;
  flex-direction: column;
  gap: 8px;
  overflow-y: auto;
  overflow-x: hidden;
  padding: 8px 4px 120px 0;
  scrollbar-width: none;
  pointer-events: none;
}
#stickyContainer::-webkit-scrollbar { display: none; }
.sticky-msg {
  background: hsla(var(--nick-hue, 50), 80%, 60%, 0.07);
  border: 1px solid hsla(var(--nick-hue, 50), 80%, 60%, 0.22);
  border-radius: 8px;
  padding: 8px 11px;
  pointer-events: auto;
  animation: stickyIn 0.25s ease;
  word-break: break-word;
}
.sticky-msg.mine {
  cursor: pointer;
  border-color: hsla(var(--nick-hue, 50), 80%, 60%, 0.42);
}
.sticky-msg.mine:hover {
  background: hsla(var(--nick-hue, 50), 80%, 60%, 0.15);
  border-color: hsla(var(--nick-hue, 50), 80%, 60%, 0.7);
}
.sticky-owner {
  font-size: 9px;
  font-family: 'Courier New', monospace;
  color: hsla(var(--nick-hue, 50), 80%, 70%, 0.6);
  letter-spacing: 0.8px;
  text-transform: uppercase;
  margin-bottom: 4px;
}
.sticky-text {
  font-family: 'Georgia', serif;
  font-size: clamp(11px, 1.4vw, 13px);
  color: hsla(var(--nick-hue, 50), 80%, 75%, 0.92);
  line-height: 1.45;
  white-space: pre-wrap;
}
.sticky-delete-hint { display: none; }
.sticky-msg.mine .sticky-delete-hint {
  font-size: 8px;
  font-family: 'Courier New', monospace;
  color: rgba(255,220,50,0.25);
  letter-spacing: 0.6px;
  margin-top: 4px;
  display: none;
}
.sticky-msg.mine:hover .sticky-delete-hint { display: block; }
@keyframes stickyIn {
  from { opacity: 0; transform: translateX(-10px); }
  to   { opacity: 1; transform: translateX(0); }
}

#hint {
  font-size: clamp(8px, 1.2vw, 10px);
  color: rgba(255,255,255,0.16);
  letter-spacing: 1.4px;
  text-transform: uppercase;
  font-family: 'Courier New', monospace;
}

/* ── MULTIPLAYER UI ── */
#topMeta {
  display: flex;
  align-items: center;
  gap: 12px;
}
#onlineCount, #nickname {
  font-family: 'Courier New', monospace;
  font-size: 10px;
  color: rgba(255,255,255,0.35);
  letter-spacing: 1.2px;
  white-space: nowrap;
  user-select: none;
}
#nickname { pointer-events: none; }
#onlineWrap {
  position: relative;
}
#onlineCount {
  cursor: pointer;
  pointer-events: all;
  transition: color 0.15s;
}
#onlineCount:hover { color: rgba(255,255,255,0.65); }
#presenceDropdown {
  display: none;
  position: absolute;
  top: calc(100% + 8px);
  left: 0;
  min-width: 160px;
  background: rgba(10,10,18,0.97);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 10px;
  padding: 6px 0;
  z-index: 200;
  backdrop-filter: blur(8px);
  box-shadow: 0 8px 24px rgba(0,0,0,0.5);
}
#presenceDropdown.open { display: block; }
.presence-item {
  padding: 5px 14px;
  font-family: 'Courier New', monospace;
  font-size: 9px;
  letter-spacing: 1px;
  color: rgba(255,255,255,0.5);
  white-space: nowrap;
  display: flex;
  align-items: center;
  gap: 7px;
}
.presence-item.me { color: rgba(255,180,100,0.85); }
.presence-dot {
  width: 5px; height: 5px;
  border-radius: 50%;
  background: rgba(100,255,140,0.7);
  flex-shrink: 0;
}

/* ── Ghost notification ── */
.ghost-notif {
  position: fixed;
  top: 56px;
  left: 50%;
  transform: translateX(-50%);
  background: rgba(255,255,255,0.07);
  border: 1px solid rgba(255,255,255,0.12);
  border-radius: 20px;
  padding: 5px 14px;
  font-family: 'Courier New', monospace;
  font-size: 10px;
  color: rgba(255,255,255,0.5);
  letter-spacing: 1.2px;
  pointer-events: none;
  z-index: 99;
  opacity: 0;
  transition: opacity 0.2s;
  white-space: nowrap;
}

/* ── THANOS MODE TOGGLE (top center) ── */
#thanosToggle {
  flex-shrink: 0;
  padding: 5px clamp(12px, 2vw, 18px);
  border-radius: 20px;
  border: 1px solid rgba(150,100,255,0.22);
  background: transparent;
  color: rgba(180,140,255,0.4);
  font-size: clamp(9px, 1.3vw, 11px);
  letter-spacing: 0.8px;
  cursor: pointer;
  font-family: 'Courier New', monospace;
  transition: all 0.2s;
  white-space: nowrap;
  text-transform: uppercase;
  pointer-events: all;
}
#thanosToggle:hover {
  border-color: rgba(150,100,255,0.45);
  color: rgba(200,160,255,0.75);
}
#thanosToggle.active {
  background: rgba(110,50,240,0.18);
  border-color: rgba(180,120,255,0.55);
  color: rgba(220,190,255,0.95);
  box-shadow: 0 0 10px rgba(130,70,255,0.25);
}

/* ── THANOS COOLDOWN TIMER (slides under button) ── */
#thanosCooldown {
  overflow: hidden;
  max-height: 0;
  transition: max-height 0.3s ease, opacity 0.3s ease;
  opacity: 0;
  font-family: 'Courier New', monospace;
  font-size: 10px;
  color: rgba(200,160,255,0.7);
  text-align: center;
  letter-spacing: 1.5px;
  padding-top: 0;
  pointer-events: none;
}
#thanosCooldown.visible {
  max-height: 28px;
  opacity: 1;
  padding-top: 5px;
}

/* ── THANOS LOG (right-side timeline) ── */
#thanosLog {
  position: fixed;
  right: clamp(14px, 3vw, 28px);
  top: 64px;
  width: clamp(160px, 22vw, 260px);
  max-height: 55vh;
  display: flex;
  flex-direction: column;
  gap: 5px;
  pointer-events: none;
  z-index: 9;
  overflow: hidden;
}
.thanos-log-entry {
  font-family: 'Courier New', monospace;
  font-size: clamp(8px, 1.05vw, 10px);
  color: rgba(200,160,255,0);
  text-align: right;
  letter-spacing: 0.6px;
  line-height: 1.45;
  padding-right: 9px;
  border-right: 2px solid rgba(140,80,255,0.35);
  transition: color 0.35s;
  word-break: keep-all;
}
.thanos-log-entry.visible {
  color: rgba(200,160,255,0.75);
}

/* ── INTRO MODAL ── */
#introModal {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.72);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 1000;
  backdrop-filter: blur(5px);
  transition: opacity 0.25s;
}
#introModal.hidden {
  display: none;
}
#introBox {
  background: rgba(10,10,20,0.98);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 16px;
  padding: 36px 36px 28px;
  max-width: 440px;
  width: 90%;
  position: relative;
  color: rgba(255,255,255,0.82);
  font-family: 'Courier New', monospace;
  box-shadow: 0 20px 60px rgba(0,0,0,0.6);
}
#introClose {
  position: absolute;
  top: 14px; right: 16px;
  background: none; border: none;
  color: rgba(255,255,255,0.35);
  font-size: 18px;
  cursor: pointer;
  line-height: 1;
  transition: color 0.15s;
  padding: 2px 6px;
}
#introClose:hover { color: rgba(255,255,255,0.85); }
#introTitle {
  font-size: 15px;
  letter-spacing: 5px;
  color: rgba(255,255,255,0.9);
  text-transform: uppercase;
  margin-bottom: 10px;
}
#introDesc {
  font-size: 11px;
  line-height: 1.8;
  color: rgba(255,255,255,0.5);
  letter-spacing: 0.6px;
  margin-bottom: 22px;
  white-space: pre-line;
}
#introShortcutsTitle {
  font-size: 9px;
  letter-spacing: 2px;
  color: rgba(200,160,255,0.6);
  text-transform: uppercase;
  margin-bottom: 8px;
}
#introShortcutsList {
  display: flex;
  flex-direction: column;
  gap: 5px;
  margin-bottom: 24px;
}
.intro-shortcut {
  font-size: 10px;
  color: rgba(255,255,255,0.45);
  letter-spacing: 0.8px;
  line-height: 1.6;
}
.intro-shortcut kbd {
  display: inline-block;
  background: rgba(255,255,255,0.07);
  border: 1px solid rgba(255,255,255,0.13);
  border-radius: 4px;
  padding: 1px 6px;
  font-family: 'Courier New', monospace;
  font-size: 9px;
  color: rgba(200,160,255,0.8);
  margin-right: 6px;
}
#introStartBtn {
  width: 100%;
  padding: 10px;
  border-radius: 8px;
  border: 1px solid rgba(150,100,255,0.3);
  background: rgba(110,50,240,0.12);
  color: rgba(200,160,255,0.85);
  font-family: 'Courier New', monospace;
  font-size: 11px;

/* ── HELPERS ── */
function measureChar(ch, font) {
  ctx.save(); ctx.font = font;
  const w = ctx.measureText(ch).width;
  ctx.restore(); return w;
}

const COLORS = ['#ff6b5b','#ffb347','#ffe066','#a8edea','#88d8b0','#c9b1ff','#ff9ff3','#54a0ff','#ff6b81','#ffffff','#f093fb','#4facfe'];

/* ── GLYPH ── */
class Glyph {
  constructor(ch, x, y, fs, color, owner) {
    this.ch = ch; this.x = x; this.y = y;
    this.ox = x; this.oy = y;
    this.fs = fs; this.color = color;
    this.owner = owner || window._nickname;
    this.font = `${fs}px Georgia, serif`;
    this.w = measureChar(ch, this.font);
    this.alpha = 0; this.scale = 0.2;
    this.alive = true; this.spawning = true; this.st = 0;
    this.dead = false;
    this.vx = 0; this.vy = 0; this.rot = 0; this.rotV = 0;
  }
  hover() {
    const dx = mouse.x - this.x, dy = mouse.y - this.y;
    return Math.abs(dx) < this.w/2 + 10 && Math.abs(dy) < this.fs/2 + 10;
  }
  kill() {
    if (this.dead) return; this.dead = true; this.spawning = false;
    const spd = 3 + Math.random()*7, a = Math.random()*Math.PI*2;
    if (mode==='explode') { this.vx=Math.cos(a)*spd*1.6; this.vy=Math.sin(a)*spd*1.6-4; }
    else if (mode==='burn') { this.vx=(Math.random()-.5)*4; this.vy=-(spd*2.0+Math.random()*8); }
    else if (mode==='void') { this.vx=(this.ox-W/2)*.025; this.vy=(this.oy-H/2)*.025; }
    else { this.vx=Math.cos(a)*spd*1.6; this.vy=Math.sin(a)*spd*1.6; this.rotV=(Math.random()-.5)*.35; }
    const n = mode==='burn' ? 36 : 9;
    for (let i=0;i<n;i++) particles.push(new Particle(this.x, this.y, this.color, mode));
  }
  update() {
    if (this.spawning) {
      this.st += .08; this.alpha = Math.min(1, this.st); this.scale = Math.min(1, .2+this.st*1.3);
      if (this.st > .95) this.spawning = false;
    } else if (this.dead) {
      if (mode==='void') { this.scale*=.87; this.alpha*=.87; this.vx*=.95; this.vy*=.95; }
      else if (mode==='burn') { this.alpha-=.022; this.vx*=.97; this.scale=Math.max(0,this.scale-.010); }
      else { this.vy+=.38; this.vx*=.98; this.alpha-=.02; this.rot+=this.rotV; }
      this.x+=this.vx; this.y+=this.vy;
      if (this.alpha<=0 || this.y>H+120 || this.x<-200 || this.x>W+200) this.alive=false;
    } else { if (this.hover() && (thanosMode || this.owner === window._nickname)) this.kill(); }
  }
  draw() {
    if (!this.alive || this.alpha<=0) return;
    ctx.save();
    ctx.globalAlpha = Math.max(0,this.alpha);
    ctx.translate(this.x, this.y); ctx.rotate(this.rot); ctx.scale(this.scale, this.scale);
    ctx.font = this.font; ctx.fillStyle = this.color;
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    if (mode==='burn' && this.dead) { ctx.shadowColor='#ff6600'; ctx.shadowBlur=32; }
    ctx.fillText(this.ch, 0, 0);
    ctx.restore();
  }
}

/* ── PARTICLE ── */
class Particle {
  constructor(x,y,color,mode) {
    this.x=x; this.y=y; this.mode=mode;
    const a=Math.random()*Math.PI*2, spd=2+Math.random()*6;
    if (mode==='burn') { this.vx=(Math.random()-.5)*6; this.vy=-(5+Math.random()*12); this.sz=1.5+Math.random()*6; const t=Math.random(); this.color=t>.75?`hsl(${Math.random()*40},100%,${82+Math.random()*18}%)`:t>.4?`hsl(${20+Math.random()*40},100%,${55+Math.random()*20}%)`:`hsl(${0+Math.random()*25},100%,${42+Math.random()*18}%)`; }
    else { const m=mode==='shatter'?2:1; this.vx=Math.cos(a)*spd*m; this.vy=Math.sin(a)*spd*m-(mode==='explode'?2:0); this.sz=1.5+Math.random()*3.5; this.color=color; }
    this.alpha=.85+Math.random()*.15; this.alive=true;
  }
  update() {
    if (this.mode==='burn') { this.vy-=.18; this.vx*=.96; this.sz*=.948; }
    else { this.vy+=.22; this.vx*=.97; }
    this.x+=this.vx; this.y+=this.vy; this.alpha-=this.mode==='burn'?.014:.023;
    if (this.alpha<=0||this.sz<.25) this.alive=false;
  }
  draw() {
    if (!this.alive) return;
    ctx.save(); ctx.globalAlpha=this.alpha; ctx.fillStyle=this.color;
    ctx.beginPath(); ctx.arc(this.x,this.y,this.sz,0,Math.PI*2); ctx.fill(); ctx.restore();
  }
}

  const spawnOwner = owner || window._nickname;
  const lines = text.split('\n').filter(l => l.length > 0);
  if (!lines.length) return;

  const panelH = document.getElementById('panel').getBoundingClientRect().height;
  const safeTop = 56 + 16;
  const safeBottom = H - panelH - 16;
  const safeLeft = W * 0.10;
  const safeRight = W * 0.90;
  const availW = safeRight - safeLeft;
  const availH = safeBottom - safeTop;

  const maxCharsInLine = Math.max(...lines.map(l => [...l].length));

  const maxFs = W < 500 ? 36 : 48;
  let fs = Math.min(
    Math.floor(availW / Math.max(maxCharsInLine * 0.62, 1)),
    Math.floor(availH / (lines.length * 1.55)),
    maxFs
  );
  fs = Math.max(18, Math.min(fs, maxFs));

  const lineH = fs * 1.5;
  const totalTextH = lines.length * lineH;

  const font = `${fs}px Georgia, serif`;
  let maxLineW = 0;
  const lineWidths = lines.map(line => {
    let w = 0;
    [...line].forEach(c => { w += measureChar(c, font); });
    if (w > maxLineW) maxLineW = w;
    return w;
  });

  const minCX = safeLeft + maxLineW / 2;
  const maxCX = safeRight - maxLineW / 2;
  const centerX = minCX + Math.random() * Math.max(0, maxCX - minCX);

  const minCY = safeTop + totalTextH / 2;
  const maxCY = safeBottom - totalTextH / 2;
  const centerY = minCY + Math.random() * Math.max(0, maxCY - minCY);

  const startY = centerY - totalTextH / 2 + lineH / 2;

  const startLen = glyphs.length;
  let clusterIdx = 0;
  lines.forEach((line, li) => {
    const chars = [...line];
    const cws = chars.map(c => measureChar(c, font));
    const lineW = lineWidths[li];
    let cx = centerX - lineW / 2;
    const baseY = startY + li * lineH;

    chars.forEach((c, ci) => {
      const gx = cx + cws[ci] / 2;
      const gy = baseY;
      const g = new Glyph(c, gx, gy, fs, COLORS[(startLen + clusterIdx) % COLORS.length], spawnOwner);
      g.st = -(clusterIdx * 0.06);
      glyphs.push(g);
      cx += cws[ci];
      clusterIdx++;
    });
  });
}

function destroyAll(owner) {
  if (thanosMode) {
    glyphs.forEach(g => g.kill());
  } else {
    const target = owner || window._nickname;
    glyphs.filter(g => g.owner === target).forEach(g => g.kill());
  }
}

/* ── NICK COLOR ── */
const _nickColorMap = {};
function getNickHue(nick) {
  if (_nickColorMap[nick] !== undefined) return _nickColorMap[nick];
  const hues = [50, 200, 120, 280, 10, 160, 320, 30, 180, 260, 90, 340];
  let hash = 0;
  for (let i = 0; i < nick.length; i++) hash = (hash * 31 + nick.charCodeAt(i)) >>> 0;
  _nickColorMap[nick] = hues[hash % hues.length];
  return _nickColorMap[nick];
}

/* ── LOCKED MSG RATE LIMIT ── */
const LOCKED_RATE_WINDOW_MS = 15000;
const LOCKED_RATE_MAX = 10;
const _lockedSendLog = [];

function showSpamWarning(msg) {
  const el = document.createElement('div');
  el.className = 'ghost-notif';
  el.textContent = msg;
  document.getElementById('app').appendChild(el);
  requestAnimationFrame(() => {
    el.style.opacity = '1';
    setTimeout(() => {
      el.style.transition = 'opacity 0.3s';
      el.style.opacity = '0';
      setTimeout(() => el.remove(), 300);
    }, 2000);
  });
}

function checkLockedRateLimit() {
  const now = Date.now();
  // 15초 이전 항목 제거
  while (_lockedSendLog.length && now - _lockedSendLog[0] > LOCKED_RATE_WINDOW_MS) {
    _lockedSendLog.shift();
  }
  if (_lockedSendLog.length >= LOCKED_RATE_MAX) {
    const waitMs = LOCKED_RATE_WINDOW_MS - (now - _lockedSendLog[0]);
    const waitSec = Math.ceil(waitMs / 1000);
    showSpamWarning(lang === 'ko' ? `잠금 메시지 너무 많아요. ${waitSec}초 후 가능합니다` : `Too many locked msgs. Wait ${waitSec}s`);
    return false;
  }
  _lockedSendLog.push(now);
  return true;
}

/* ── LOCK / STICKY MESSAGES ── */
let _locked = false;

document.getElementById('lockBtn').addEventListener('click', () => {
  _locked = !_locked;
  document.getElementById('lockBtn').classList.toggle('active', _locked);
  document.getElementById('lockBtn').textContent = _locked ? '🔓' : '🔒';
});

function sendMessage(text) {
  if (!text.trim()) return;
  if (_locked) {
    if (!checkLockedRateLimit()) return;
    const id = Date.now() + '_' + Math.random().toString(36).slice(2);
    addStickyMessage(text, window._nickname, id);
    if (window._room) {
      window._room.send({
        type: 'broadcast', event: 'sticky_add',
        payload: { text, nickname: window._nickname, id }
      });
    }
  } else {
    spawnText(text);
    if (window._room) {
      window._room.send({
        type: 'broadcast', event: 'spawn',
        payload: { text, nickname: window._nickname, lang, mode }
      });
    }
    return;
  }
  document.getElementById('textInput').value = '';
}

function addStickyMessage(text, owner, id) {
  const container = document.getElementById('stickyContainer');
  const el = document.createElement('div');
  el.className = 'sticky-msg' + (owner === window._nickname ? ' mine' : '');
  el.style.setProperty('--nick-hue', getNickHue(owner));
  el.dataset.id = id;
  el.innerHTML = `<div class="sticky-owner">${owner}</div><div class="sticky-text">${text.replace(/</g,'&lt;').replace(/>/g,'&gt;')}</div><div class="sticky-delete-hint">클릭하여 삭제</div>`;
  if (owner === window._nickname) {
    el.addEventListener('click', () => {
      el.remove();
      if (window._room) {
        window._room.send({ type: 'broadcast', event: 'sticky_remove', payload: { id } });
      }
    });
  }
  container.appendChild(el);
  container.scrollTop = container.scrollHeight;
}

document.getElementById('spawnBtn').addEventListener('click', () => {
  const text = document.getElementById('textInput').value;
  sendMessage(text);
});
document.getElementById('destroyBtn').addEventListener('click', () => {
  destroyAll();
  if (window._room) {
    window._room.send({
      type: 'broadcast', event: 'destroy_all',
      payload: { nickname: window._nickname, thanosMode }
    });
  }
});
let _composing = false;
document.getElementById('textInput').addEventListener('compositionstart', () => { _composing = true; });
document.getElementById('textInput').addEventListener('compositionend', () => { setTimeout(() => { _composing = false; }, 0); });
document.getElementById('textInput').addEventListener('keydown', e => {
  if (e.key==='Enter' && !e.shiftKey && !e.isComposing && !_composing) {
    e.preventDefault();
    const text = e.target.value;
    sendMessage(text);
  }
});

/* ── KEYBOARD SHORTCUTS Ctrl+1~4 ── */
document.addEventListener('keydown', e => {
  if (e.ctrlKey && ['1','2','3','4'].includes(e.key)) {
    e.preventDefault();
    const idx = parseInt(e.key) - 1;
    mode = modeKeys[idx];
    document.querySelectorAll('.modeBtn').forEach((b, i) => b.classList.toggle('active', i === idx));
    glyphs.forEach(g => g.kill());
    if (window._room) {
      window._room.send({
        type: 'broadcast', event: 'destroy_all',
        payload: { nickname: window._nickname, thanosMode: true }
      });
    }
  }
});

/* ── RENDER LOOP ── */
function loop() {
  ctx.fillStyle = _isLight ? 'rgba(240,237,232,0.22)' : 'rgba(7,7,13,0.22)';
  ctx.fillRect(0,0,W,H);
  particles = particles.filter(p=>p.alive);
  particles.forEach(p=>{p.update();p.draw();});
  glyphs.forEach(g=>{g.update();g.draw();});
  glyphs = glyphs.filter(g=>g.alive||!g.dead);
  requestAnimationFrame(loop);
}

spawnText(lastText);
loop();

/* ── THANOS TOGGLE ── */
const _thanosPressLog = [];
let _thanosBlockedUntil = 0;
let _thanosBlockTimer = null;

function setThanosCooldownVisible(visible, text) {
  const cd = document.getElementById('thanosCooldown');
  if (visible) {
    cd.textContent = text || '';
    cd.classList.add('visible');
  } else {
    cd.classList.remove('visible');
  }
}

document.getElementById('thanosToggle').addEventListener('click', () => {
  const now = Date.now();

  if (now < _thanosBlockedUntil) {
    const sec = Math.ceil((_thanosBlockedUntil - now) / 1000);
    addThanosLog('⚠', LANG[lang].thanosBlocked(sec));
    return;
  }

  // 1분 이내 클릭만 남기기
  const oneMinAgo = now - 60 * 1000;
  while (_thanosPressLog.length && _thanosPressLog[0] < oneMinAgo) _thanosPressLog.shift();
  _thanosPressLog.push(now);

  // 1분 내 3회 이상이면 3분 차단
  if (_thanosPressLog.length >= 3) {
    _thanosBlockedUntil = now + 3 * 60 * 1000;
    _thanosPressLog.length = 0;

    if (thanosMode) {
      thanosMode = false;
      const btn = document.getElementById('thanosToggle');
      btn.classList.remove('active');
      btn.textContent = LANG[lang].thanosOff;
      if (window._room) {
        window._room.send({ type: 'broadcast', event: 'thanos_toggle',
          payload: { nickname: window._nickname, on: false } });
      }
    }

    const btn = document.getElementById('thanosToggle');
    btn.disabled = true;
    btn.style.opacity = '0.4';

    const tick = () => {
      const rem = Math.ceil((_thanosBlockedUntil - Date.now()) / 1000);
      if (rem <= 0) {
        btn.disabled = false;
        btn.style.opacity = '';
        btn.textContent = LANG[lang].thanosOff;
        setThanosCooldownVisible(false);
        _thanosBlockTimer = null;
      } else {
        btn.textContent = `🔱 ${rem}s`;
        setThanosCooldownVisible(true, lang === 'ko' ? `남용 감지 — ${rem}초 후 해제` : `Abuse detected — ${rem}s left`);
        _thanosBlockTimer = setTimeout(tick, 1000);
      }
    };
    tick();
    addThanosLog('⚠', LANG[lang].thanosBlocked(180));
    return;
  }

  thanosMode = !thanosMode;
  const btn = document.getElementById('thanosToggle');
  btn.classList.toggle('active', thanosMode);
  btn.textContent = thanosMode ? LANG[lang].thanosOn : LANG[lang].thanosOff;
  addThanosLog(window._nickname, thanosMode);
  if (window._room) {
    window._room.send({
      type: 'broadcast', event: 'thanos_toggle',
      payload: { nickname: window._nickname, on: thanosMode }
    });
  }
});

/* ── THANOS LOG ── */
function addThanosLog(nick, isOn) {
  const log = document.getElementById('thanosLog');
  const el = document.createElement('div');
  el.className = 'thanos-log-entry';
  el.textContent = typeof isOn === 'string' ? isOn : (isOn ? LANG[lang].thanosLogOn(nick) : LANG[lang].thanosLogOff(nick));
  log.appendChild(el);
  requestAnimationFrame(() => el.classList.add('visible'));
  while (log.children.length > 20) log.removeChild(log.firstChild);
  setTimeout(() => {
    el.classList.remove('visible');
    setTimeout(() => el.remove(), 350);
  }, 8000);
}

/* ── GHOST NOTIFICATION ── */
function showNotification(nick, eventType) {
  if (nick === window._nickname) return;
  const el = document.createElement('div');
  el.className = 'ghost-notif';
  if (lang === 'ko') {
    el.textContent = eventType === 'spawn'
      ? `${nick}이 소환했습니다`
      : `${nick}이 전부 파괴했습니다`;
  } else {
    el.textContent = eventType === 'spawn'
      ? `${nick} spawned`
      : `${nick} destroyed all`;
  }
  document.getElementById('app').appendChild(el);
  requestAnimationFrame(() => {
    el.style.opacity = '1';
    setTimeout(() => {
      el.style.transition = 'opacity 0.3s';
      el.style.opacity = '0';
      setTimeout(() => el.remove(), 300);
    }, 2000);
  });
}

/* ── ONLINE COUNT + PRESENCE ── */
let _presenceNicks = [];

function updateOnlineCount(count) {
  const el = document.getElementById('onlineCount');
  if (!el) return;
  el.textContent = lang === 'ko' ? `● ${count}명 ▾` : `● ${count} online ▾`;
}

function renderPresenceDropdown() {
  const dd = document.getElementById('presenceDropdown');
  if (!dd) return;
  dd.innerHTML = '';
  _presenceNicks.forEach(nick => {
    const div = document.createElement('div');
    div.className = 'presence-item' + (nick === window._nickname ? ' me' : '');
    const dot = document.createElement('span');
    dot.className = 'presence-dot';
    div.appendChild(dot);
    div.appendChild(document.createTextNode(nick));
    dd.appendChild(div);
  });
}

document.getElementById('onlineCount').addEventListener('click', e => {
  e.stopPropagation();
  document.getElementById('presenceDropdown').classList.toggle('open');
  renderPresenceDropdown();
});

document.addEventListener('click', () => {
  document.getElementById('presenceDropdown').classList.remove('open');
});

/* ── INTRO MODAL ── */
function buildIntroModal() {
  const L = LANG[lang];
  document.getElementById('introTitle').textContent = L.introTitle;
  document.getElementById('introDesc').textContent = L.introDesc;
  document.getElementById('introShortcutsTitle').textContent = L.introShortcutsTitle;
  const list = document.getElementById('introShortcutsList');
  list.innerHTML = '';
  L.introShortcuts.forEach(s => {
    const div = document.createElement('div');
    div.className = 'intro-shortcut';
    const kbd = document.createElement('kbd');
    kbd.textContent = s.key;
    div.appendChild(kbd);
    div.appendChild(document.createTextNode(s.desc));
    list.appendChild(div);
  });
  document.getElementById('introStartBtn').textContent = L.introStartBtn;
}

function showIntroModal() {
  buildIntroModal();
  document.getElementById('introModal').classList.remove('hidden');
}

function hideIntroModal() {
  document.getElementById('introModal').classList.add('hidden');
  sessionStorage.setItem('obliterate_intro_seen', '1');
}

document.getElementById('introClose').addEventListener('click', hideIntroModal);
document.getElementById('introStartBtn').addEventListener('click', hideIntroModal);
document.getElementById('introModal').addEventListener('click', e => {
  if (e.target === document.getElementById('introModal')) hideIntroModal();
});

// Show on first visit
if (!sessionStorage.getItem('obliterate_intro_seen')) {
  setTimeout(showIntroModal, 300);
}
